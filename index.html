<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheaper Brothers Printing — 合作伙伴手册</title>
  <meta name="description" content="Cheaper Brothers Printing 合作伙伴资料库 — 服务、材料、报价及账单" />

  <!-- Docsify CSS -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css" />

  <!-- Custom Styles -->
  <style>
    :root {
      --sidebar-width: 18rem;
      --base-font-size: 16px;
      --theme-color: #4a8cff;
    }

    .sidebar {
      background: #111;
      border-right: 1px solid #222;
    }

    .sidebar-nav li {
      margin: 0;
    }

    .sidebar ul li a {
      color: #aaa;
      font-size: 15px;
      padding: 10px 20px;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }

    .sidebar ul li a:hover {
      color: #fff;
      background: #1a1a1a;
      border-left-color: var(--theme-color);
    }

    .sidebar ul li.active > a {
      color: var(--theme-color);
      border-left-color: var(--theme-color);
      font-weight: 600;
    }

    .sidebar-nav ul {
      padding-left: 0;
    }

    .sidebar-nav ul ul {
      padding-left: 20px;
      list-style: none;
    }

    .sidebar-nav ul ul a {
      padding-left: 30px;
      font-size: 14px;
    }

    /* App name / logo */
    .app-name-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    .app-name-link::before {
      content: "CBP";
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #4a8cff;
      margin-bottom: 4px;
    }

    .app-name-link span {
      font-size: 11px;
      color: #666;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .app-name-link img,
    .app-name-link p {
      display: none;
    }

    .content {
      padding-top: 40px;
    }

    .markdown-section h1 {
      font-size: 2.2rem;
      border-bottom: 1px solid #222;
      padding-bottom: 16px;
      margin-bottom: 32px;
    }

    .markdown-section h2 {
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 8px;
    }

    .markdown-section table {
      width: 100%;
      border-collapse: collapse;
    }

    .markdown-section th {
      background: #1a1a1a;
      color: #4a8cff;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .markdown-section td,
    .markdown-section th {
      border-color: #2a2a2a;
      padding: 10px 14px;
    }

    .markdown-section tr:nth-child(even) {
      background: #0d0d0d;
    }

    .markdown-section blockquote {
      border-left: 4px solid #4a8cff;
      background: #0d1520;
      color: #ccc;
    }

    /* Private page indicator */
    .private-badge {
      display: inline-block;
      background: #ff8c3a;
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Cover */
    section.cover {
      background: linear-gradient(135deg, #0a0a0a 0%, #111 50%, #0a1520 100%) !important;
    }
    section.cover h1 {
      color: #4a8cff !important;
      font-size: 3rem;
      font-weight: 900;
    }
    section.cover p {
      color: #888 !important;
    }
    section.cover .cover-main > p:last-child a {
      color: #4a8cff !important;
      border-color: #4a8cff !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Cheaper Brothers Printing',
      repo: 'xionggor/cheaper-brothers-docs',
      loadSidebar: true,
      auto2top: true,
      coverpage: true,
      search: 'auto',
      subMaxLevel: 3,
      themeColor: '#4a8cff',
      formatUpdated: '{YYYY}-{MM}-{DD}',
      pagination: {
        previousText: '← 上一页',
        nextText: '下一页 →',
        crossChapter: true
      },
    }
  </script>

  <!-- Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

  <!-- Prism for code highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>

  <!-- Auth check for private pages -->
  <script>
  (function() {
    var cookieName = 'cbp_session';
    function checkAuth() {
      var hash = window.location.hash;
      if (hash && (hash.indexOf('/private') >= 0 || hash.indexOf('private/') >= 0)) {
        var hasCookie = document.cookie.split(';').some(function(c) {
          return c.trim().indexOf(cookieName + '=') === 0;
        });
        if (!hasCookie) {
          window.location.href = '/login?goto=' + encodeURIComponent(window.location.pathname + window.location.hash);
        }
      }
    }
    checkAuth();
    window.addEventListener('hashchange', checkAuth);
  })();
  </script>
</body>
</html>
