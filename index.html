<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheaper Brothers Printing — 合作伙伴手册</title>
  <meta name="description" content="Cheaper Brothers Printing 合作伙伴资料库 — 服务、材料、报价及账单" />

  <!-- Docsify CSS - Vue theme as base (clean light) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />

  <!-- Warm White Custom Styles -->
  <style>
    :root {
      --sidebar-width: 18rem;
      --base-font-size: 16px;
      --theme-color: #c8954e;
      --bg-warm: #faf7f2;
      --bg-sidebar: #f0eadc;
      --text-dark: #3d3530;
      --text-muted: #8a7e72;
      --border-warm: #e3dac8;
      --accent-gold: #c8954e;
      --accent-light: #f5e6d0;
    }

    /* Base */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      background: var(--bg-warm);
      color: var(--text-dark);
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-warm);
    }

    .sidebar-nav li {
      margin: 0;
    }

    .sidebar ul li a {
      color: var(--text-muted);
      font-size: 15px;
      padding: 10px 20px;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }

    .sidebar ul li a:hover {
      color: var(--text-dark);
      background: rgba(255,255,255,0.5);
      border-left-color: var(--accent-gold);
    }

    .sidebar ul li.active > a {
      color: var(--accent-gold);
      border-left-color: var(--accent-gold);
      font-weight: 600;
    }

    .sidebar-nav ul {
      padding-left: 0;
    }

    .sidebar-nav ul ul {
      padding-left: 20px;
      list-style: none;
    }

    .sidebar-nav ul ul a {
      padding-left: 30px;
      font-size: 14px;
    }

    /* App name / logo */
    .app-name-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border-warm);
    }

    .app-name-link::before {
      content: "CBP";
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--accent-gold);
      margin-bottom: 6px;
    }

    .app-name-link span {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .app-name-link img,
    .app-name-link p {
      display: none;
    }

    /* Content area */
    .content {
      padding-top: 40px;
      background: var(--bg-warm);
    }

    .markdown-section {
      max-width: 860px;
      color: var(--text-dark);
    }

    .markdown-section h1 {
      font-size: 2rem;
      color: #2d2824;
      border-bottom: 2px solid var(--accent-light);
      padding-bottom: 14px;
      margin-bottom: 28px;
      font-weight: 700;
    }

    .markdown-section h2 {
      color: #3d3530;
      border-bottom: 1px solid var(--border-warm);
      padding-bottom: 8px;
      margin-top: 36px;
      font-weight: 600;
    }

    .markdown-section h3 {
      color: #4d4238;
      font-weight: 600;
      margin-top: 24px;
    }

    .markdown-section p {
      line-height: 1.7;
      color: var(--text-dark);
    }

    /* Tables */
    .markdown-section table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      border-radius: 6px;
      overflow: hidden;
    }

    .markdown-section th {
      background: #e8dcc8;
      color: #4d4238;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 10px 14px;
    }

    .markdown-section td,
    .markdown-section th {
      border: 1px solid var(--border-warm);
      padding: 10px 14px;
    }

    .markdown-section tr:nth-child(even) {
      background: #f5efe4;
    }

    .markdown-section tr:hover {
      background: #efe6d6;
    }

    /* Blockquotes */
    .markdown-section blockquote {
      border-left: 4px solid var(--accent-gold);
      background: #f5efe4;
      color: var(--text-dark);
      padding: 12px 20px;
      border-radius: 0 6px 6px 0;
    }

    /* Code / inline */
    .markdown-section code {
      background: #efe6d6;
      color: #5d4d3d;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }

    /* Links */
    .markdown-section a {
      color: var(--accent-gold);
      font-weight: 500;
    }

    .markdown-section a:hover {
      color: #a67a3a;
      text-decoration: underline;
    }

    /* Horizontal rule */
    .markdown-section hr {
      border: none;
      border-top: 1px solid var(--border-warm);
      margin: 32px 0;
    }

    /* Lists */
    .markdown-section ul li {
      margin: 6px 0;
      line-height: 1.6;
    }

    /* Cover page */
    section.cover {
      background: linear-gradient(135deg, #f5efe4 0%, #faf7f2 50%, #f0eadc 100%) !important;
    }
    section.cover .cover-main {
      max-width: 600px;
      margin: 0 auto;
    }
    section.cover h1 {
      color: #2d2824 !important;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    section.cover p {
      color: var(--text-muted) !important;
      font-size: 1.1rem;
      line-height: 1.6;
    }
    section.cover .cover-main > p:last-child a {
      color: var(--accent-gold) !important;
      border-color: var(--accent-gold) !important;
      border-radius: 6px;
      padding: 10px 28px;
      font-weight: 600;
      transition: all 0.2s;
    }
    section.cover .cover-main > p:last-child a:hover {
      background: var(--accent-gold) !important;
      color: #fff !important;
    }

    /* Copy code button */
    .docsify-copy-code-button {
      background: var(--accent-gold) !important;
      border-radius: 4px !important;
    }

    /* Search */
    .sidebar .search {
      border-bottom: 1px solid var(--border-warm);
    }
    .sidebar .search input {
      background: #f5efe4;
      border: 1px solid var(--border-warm);
      border-radius: 6px;
      color: var(--text-dark);
    }
    .sidebar .search input:focus {
      border-color: var(--accent-gold);
    }

    /* Pagination */
    .docsify-pagination-container {
      border-top: 1px solid var(--border-warm) !important;
    }
    .pagination-item-label {
      color: var(--accent-gold) !important;
    }
    .pagination-item-subtitle {
      color: var(--text-muted) !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Cheaper Brothers Printing',
      repo: 'xionggor/cheaper-brothers-docs',
      loadSidebar: true,
      auto2top: true,
      coverpage: false,
      search: 'auto',
      subMaxLevel: 3,
      themeColor: '#c8954e',
      formatUpdated: '{YYYY}-{MM}-{DD}',
      pagination: {
        previousText: '← 上一页',
        nextText: '下一页 →',
        crossChapter: true
      },
    }
  </script>

  <!-- Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

  <!-- Auth check for private pages -->
  <script>
  (function() {
    var cookieName = 'cbp_session';
    function checkAuth() {
      var hash = window.location.hash;
      if (hash && (hash.indexOf('/private') >= 0 || hash.indexOf('private/') >= 0)) {
        var hasCookie = document.cookie.split(';').some(function(c) {
          return c.trim().indexOf(cookieName + '=') === 0;
        });
        if (!hasCookie) {
          window.location.href = '/login?goto=' + encodeURIComponent(window.location.pathname + window.location.hash);
        }
      }
    }
    checkAuth();
    window.addEventListener('hashchange', checkAuth);
  })();
  </script>
</body>
</html>
